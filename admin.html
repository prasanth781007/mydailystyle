<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel – MyDailyStyle</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .user-table-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      padding: 24px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      color: var(--text-primary);
    }
    th {
      text-align: left;
      padding: 12px;
      border-bottom: 2px solid var(--border-glass);
      color: var(--text-secondary);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    td {
      padding: 16px 12px;
      border-bottom: 1px solid var(--border-glass);
      font-size: 0.9rem;
    }
    tr:hover { background: rgba(255,255,255,0.02); }
    .status-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-admin { background: rgba(124,58,237,0.2); color: var(--accent-3); }
    .badge-user  { background: rgba(255,255,255,0.1); color: var(--text-secondary); }
    
    .error-gate {
      display: none;
      text-align: center;
      padding: 100px 20px;
    }
    .error-gate i { font-size: 4rem; color: var(--error); margin-bottom: 20px; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="dashboard.html" class="navbar-brand">
    <div class="navbar-logo"><i class="fa-solid fa-screwdriver-wrench"></i></div>
    <span class="navbar-title">Admin Dashboard</span>
  </a>
  <div class="navbar-user">
    <a href="dashboard.html" class="btn btn-secondary btn-sm">Exit Admin</a>
  </div>
</nav>

<div class="page-wrapper" id="adminContent">
  <div class="container">
    <div class="section-header">
      <div>
        <h1 class="section-title">System Overview</h1>
        <p class="section-subtitle">Real-time statistics across all users</p>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="location.reload()">
        <i class="fa-solid fa-rotate"></i> Refresh Data
      </button>
    </div>

    <!-- Stats -->
    <div class="admin-stats">
      <div class="stat-card">
        <div class="stat-icon stat-icon-purple"><i class="fa-solid fa-users"></i></div>
        <div>
          <div class="stat-value" id="totalUsers">0</div>
          <div class="stat-label">Total Users</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon-pink"><i class="fa-solid fa-shirt"></i></div>
        <div>
          <div class="stat-value" id="totalItems">0</div>
          <div class="stat-label">Total Wardrobe Items</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon stat-icon-gold"><i class="fa-solid fa-calendar-check"></i></div>
        <div>
          <div class="stat-value" id="totalPlanned">0</div>
          <div class="stat-label">Total Planned Days</div>
        </div>
      </div>
    </div>

    <!-- Users Table -->
    <div class="section-header" style="margin-top:20px;">
      <h2 class="section-title">Registered Users</h2>
    </div>
    <div class="user-table-wrap">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Email</th>
            <th>Items</th>
            <th>Planned</th>
            <th>Joined</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="userTableBody">
          <!-- Rows added via JS -->
          <tr><td colspan="5" style="text-align:center;padding:40px;"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="accessDenied" class="error-gate">
  <i class="fa-solid fa-shield-halved"></i>
  <h2>Access Denied</h2>
  <p>You do not have administrative privileges to view this page.</p>
  <a href="dashboard.html" class="btn btn-primary" style="margin-top:20px;">Return to Dashboard</a>
</div>

<script src="js/firebase-config.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
