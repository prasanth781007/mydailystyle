<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloudinary Test – MyDailyStyle</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 520px;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 30px; }

    /* Config display */
    .config-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      font-size: 0.85rem;
    }
    .config-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .config-row:last-child { border-bottom: none; }
    .config-key   { color: #64748b; font-weight: 600; }
    .config-value { color: #a855f7; font-weight: 700; font-family: monospace; }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed rgba(168,85,247,0.4);
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
      position: relative;
    }
    .upload-zone:hover { border-color: #a855f7; background: rgba(168,85,247,0.05); }
    .upload-zone input {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      opacity: 0; cursor: pointer;
    }
    .upload-zone i { font-size: 2rem; color: #7c3aed; margin-bottom: 10px; display: block; }
    .upload-zone p { color: #64748b; font-size: 0.85rem; }
    .upload-zone strong { color: #a855f7; }

    /* Preview */
    #previewSection { display: none; margin-bottom: 16px; text-align: center; }
    #previewImg     { max-height: 150px; border-radius: 10px; border: 1px solid rgba(168,85,247,0.3); }

    /* Button */
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,58,237,0.4); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Result */
    #result { margin-top: 20px; display: none; border-radius: 12px; padding: 16px; }
    #result.success {
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.3);
    }
    #result.error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
    }
    .result-title {
      display: flex; align-items: center; gap: 8px;
      font-weight: 700; margin-bottom: 10px; font-size: 1rem;
    }
    .result-title.ok  { color: #34d399; }
    .result-title.err { color: #f87171; }
    .result-url {
      font-size: 0.78rem;
      color: #64748b;
      word-break: break-all;
      background: rgba(0,0,0,0.3);
      padding: 8px 10px;
      border-radius: 6px;
      margin-top: 8px;
    }
    .result-url a { color: #a855f7; text-decoration: none; }
    .result-img { width: 100%; max-height: 160px; object-fit: contain; border-radius: 8px; margin-top: 10px; }
    .preset-warning {
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 10px;
      padding: 14px;
      font-size: 0.82rem;
      color: #fbbf24;
      margin-top: 10px;
      line-height: 1.6;
    }
    .preset-warning strong { display: block; margin-bottom: 4px; font-size: 0.9rem; }
    .back-btn {
      display: inline-block;
      margin-top: 24px;
      color: #64748b;
      text-decoration: none;
      font-size: 0.85rem;
    }
    .back-btn:hover { color: #a855f7; }
  </style>
</head>
<body>
  <div class="card">
    <h1><i class="fa-solid fa-cloud-arrow-up" style="font-size:1.2rem;"></i> Cloudinary Test</h1>
    <p class="subtitle">Checks if your Cloudinary config is working correctly</p>

    <!-- Current Config Display -->
    <div class="config-box">
      <div class="config-row">
        <span class="config-key">Cloud Name</span>
        <span class="config-value" id="showCloud">loading…</span>
      </div>
      <div class="config-row">
        <span class="config-key">Upload Preset</span>
        <span class="config-value" id="showPreset">loading…</span>
      </div>
      <div class="config-row">
        <span class="config-key">Upload URL</span>
        <span class="config-value" id="showUrl" style="font-size:0.7rem;">loading…</span>
      </div>
    </div>

    <!-- Upload Zone -->
    <div class="upload-zone" id="zone">
      <input type="file" id="fileInput" accept="image/*" />
      <i class="fa-solid fa-image"></i>
      <p><strong>Click to select any image</strong><br/>or drag & drop here</p>
    </div>

    <!-- Preview -->
    <div id="previewSection">
      <img id="previewImg" src="" alt="Preview" />
    </div>

    <!-- Test Button -->
    <button class="btn" id="testBtn" disabled>
      <i class="fa-solid fa-vial"></i> Test Upload to Cloudinary
    </button>

    <!-- Result -->
    <div id="result"></div>

    <a href="store.html" class="back-btn">← Back to My Store</a>
  </div>

  <script>
    // ── Read values directly from firebase-config.js via import ──
    // We inline the same config here to test independently
    const CLOUD_NAME    = "dekkfy637";
    const UPLOAD_PRESET = "mydailystyle1";

    // Show config
    document.getElementById('showCloud').textContent  = CLOUD_NAME;
    document.getElementById('showPreset').textContent = UPLOAD_PRESET;
    document.getElementById('showUrl').textContent    =
      `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;

    let selectedFile = null;

    // File select
    document.getElementById('fileInput').addEventListener('change', e => {
      selectedFile = e.target.files[0];
      if (!selectedFile) return;
      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById('previewImg').src = ev.target.result;
        document.getElementById('previewSection').style.display = 'block';
      };
      reader.readAsDataURL(selectedFile);
      document.getElementById('testBtn').disabled = false;
    });

    // Drag & drop
    const zone = document.getElementById('zone');
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor='#a855f7'; });
    zone.addEventListener('dragleave', () => { zone.style.borderColor=''; });
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.style.borderColor='';
      selectedFile = e.dataTransfer.files[0];
      if (!selectedFile) return;
      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById('previewImg').src = ev.target.result;
        document.getElementById('previewSection').style.display = 'block';
      };
      reader.readAsDataURL(selectedFile);
      document.getElementById('testBtn').disabled = false;
    });

    // Test upload
    document.getElementById('testBtn').addEventListener('click', async () => {
      const btn    = document.getElementById('testBtn');
      const result = document.getElementById('result');

      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Uploading…';
      result.style.display = 'none';

      try {
        const formData = new FormData();
        formData.append('file',          selectedFile);
        formData.append('upload_preset', UPLOAD_PRESET);
        formData.append('folder',        'mydailystyle_test');

        const res  = await fetch(
          `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
          { method: 'POST', body: formData }
        );
        const data = await res.json();

        if (!res.ok || data.error) {
          // ── FAILED ────────────────────────────────────────────
          const errMsg = data.error ? data.error.message : `HTTP ${res.status}`;
          result.className  = 'error';
          result.style.display = 'block';
          result.innerHTML = `
            <div class="result-title err">
              <i class="fa-solid fa-circle-xmark"></i> Upload FAILED
            </div>
            <div style="color:#fca5a5;font-size:0.85rem;margin-bottom:10px;">
              <strong>Error:</strong> ${errMsg}
            </div>
            <div class="preset-warning">
              <strong>⚠️ How to fix this:</strong>
              1. Go to <a href="https://console.cloudinary.com" target="_blank" style="color:#fbbf24;">cloudinary.com</a><br/>
              2. Settings → Upload → Upload presets<br/>
              3. Click on <strong>${UPLOAD_PRESET}</strong><br/>
              4. Change <strong>Signing mode</strong> → <strong>Unsigned</strong><br/>
              5. Click Save, then test again.
            </div>`;
        } else {
          // ── SUCCESS ───────────────────────────────────────────
          result.className  = 'success';
          result.style.display = 'block';
          result.innerHTML = `
            <div class="result-title ok">
              <i class="fa-solid fa-circle-check"></i> Cloudinary is WORKING! ✅
            </div>
            <div style="color:#6ee7b7;font-size:0.85rem;">
              Image uploaded successfully to Cloudinary.
            </div>
            <img src="${data.secure_url}" alt="Uploaded" class="result-img" />
            <div class="result-url">
              URL: <a href="${data.secure_url}" target="_blank">${data.secure_url}</a>
            </div>`;
        }
      } catch (err) {
        result.className  = 'error';
        result.style.display = 'block';
        result.innerHTML = `
          <div class="result-title err">
            <i class="fa-solid fa-circle-xmark"></i> Network Error
          </div>
          <div style="color:#fca5a5;font-size:0.85rem;">${err.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-vial"></i> Test Again';
      }
    });
  </script>
</body>
</html>
