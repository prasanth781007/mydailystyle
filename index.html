<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyDailyStyle – Smart Wardrobe & Outfit Planner</title>
  <meta name="description" content="Plan your daily outfits with MyDailyStyle – the smart wardrobe and outfit planner that helps you look great every day." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body class="auth-body">

  <!-- Animated background blobs -->
  <div class="auth-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="auth-wrapper">

    <!-- ── Branding ── -->
    <div class="auth-brand fade-in-up">
      <div class="auth-logo">
        <i class="fa-solid fa-shirt"></i>
      </div>
      <h1 class="auth-app-name">MyDailyStyle</h1>
      <p class="auth-tagline">Your Smart Wardrobe &amp; Outfit Planner</p>
    </div>

    <!-- ── Auth Card ── -->
    <div class="auth-card glass-card fade-in-up delay-1">

      <!-- Tab Switcher -->
      <div class="auth-tabs" id="authTabs">
        <button class="auth-tab active" data-tab="login" id="tabLogin">Sign In</button>
        <button class="auth-tab" data-tab="register" id="tabRegister">Create Account</button>
      </div>

      <!-- ─── LOGIN PANEL ─── -->
      <div class="auth-panel active" id="panelLogin">
        <form id="loginForm" novalidate>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="input-icon-wrap">
              <i class="fa-solid fa-envelope input-icon"></i>
              <input id="loginEmail" type="email" class="form-input" placeholder="you@example.com" autocomplete="email" required />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-icon-wrap">
              <i class="fa-solid fa-lock input-icon"></i>
              <input id="loginPassword" type="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required />
              <i class="fa-solid fa-eye input-icon-right" id="toggleLoginPwd"></i>
            </div>
          </div>
          <div class="auth-options">
            <label class="checkbox-label">
              <input type="checkbox" id="rememberMe" />
              <span>Remember me</span>
            </label>
            <button type="button" class="link-btn" id="showForgot">Forgot password?</button>
          </div>
          <div id="loginError" class="auth-error"></div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
            Sign In
          </button>
        </form>
        <div class="auth-divider"><span>or continue with</span></div>
        <button class="btn-google" id="googleSignIn">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
          Continue with Google
        </button>
      </div>

      <!-- ─── REGISTER PANEL ─── -->
      <div class="auth-panel" id="panelRegister">
        <form id="registerForm" novalidate>
          <div class="form-group">
            <label class="form-label">Display Name</label>
            <div class="input-icon-wrap">
              <i class="fa-solid fa-user input-icon"></i>
              <input id="regName" type="text" class="form-input" placeholder="Your full name" required />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="input-icon-wrap">
              <i class="fa-solid fa-envelope input-icon"></i>
              <input id="regEmail" type="email" class="form-input" placeholder="you@example.com" autocomplete="email" required />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-icon-wrap">
              <i class="fa-solid fa-lock input-icon"></i>
              <input id="regPassword" type="password" class="form-input" placeholder="Min 8 characters" autocomplete="new-password" required />
              <i class="fa-solid fa-eye input-icon-right" id="toggleRegPwd"></i>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <div class="input-icon-wrap">
              <i class="fa-solid fa-lock input-icon"></i>
              <input id="regConfirm" type="password" class="form-input" placeholder="Re-enter password" required />
            </div>
          </div>
          <div id="registerError" class="auth-error"></div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" id="registerBtn">
            <i class="fa-solid fa-user-plus"></i>
            Create Account
          </button>
        </form>
        <div class="auth-divider"><span>or continue with</span></div>
        <button class="btn-google" id="googleSignUp">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
          Continue with Google
        </button>
      </div>

      <!-- ─── FORGOT PASSWORD PANEL ─── -->
      <div class="auth-panel" id="panelForgot">
        <div class="forgot-icon">
          <i class="fa-solid fa-key"></i>
        </div>
        <h2 class="forgot-title">Reset Password</h2>
        <p class="forgot-desc">Enter your email and we'll send you a reset link.</p>
        <form id="forgotForm" novalidate>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="input-icon-wrap">
              <i class="fa-solid fa-envelope input-icon"></i>
              <input id="forgotEmail" type="email" class="form-input" placeholder="you@example.com" required />
            </div>
          </div>
          <div id="forgotMsg" class="auth-message"></div>
          <button type="submit" class="btn btn-primary btn-full" id="forgotBtn">
            <i class="fa-solid fa-paper-plane"></i>
            Send Reset Link
          </button>
        </form>
        <button class="link-btn back-btn" id="backToLogin">
          <i class="fa-solid fa-arrow-left"></i> Back to Sign In
        </button>
      </div>

    </div><!-- /auth-card -->

    <p class="auth-footer">© 2025 MyDailyStyle. Look good, feel great.</p>

  </div><!-- /auth-wrapper -->

  <!-- Toast -->
  <div id="toast-container"></div>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
